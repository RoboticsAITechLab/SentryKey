name: sentry_key
description: A cross-platform password manager.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  get_it: ^9.0.5

  sqflite_sqlcipher: ^3.4.0
  flutter_secure_storage: ^10.1.0

  crypto: ^3.0.6
  go_router: ^17.0.0
  dartz: ^0.10.1

  google_fonts: ^8.1.0
  font_awesome_flutter: ^10.10.0

  encrypt: ^5.0.3
  pointycastle: ^3.7.3
  uuid: ^4.5.1
  path: ^1.9.1
  local_auth: ^3.0.1
  file_picker: ^8.1.4
  open_filex: ^4.7.0
  path_provider: ^2.1.5
  video_player: ^2.8.2
  audioplayers: ^6.0.0
  google_sign_in: ^6.2.1
  googleapis: ^13.1.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.13
  archive: ^3.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true